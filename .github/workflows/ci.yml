name: Subscription Intelligence Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Critical lint checks
        run: flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Style lint checks
        run: flake8 src tests --count --exit-zero --max-complexity=10 --statistics

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java for PySpark
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYSPARK_PYTHON: python3

  schema-check:
    name: SQL Schema Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: billing_db
          POSTGRES_USER: billing_user
          POSTGRES_PASSWORD: billing_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Apply schema
        run: psql -h localhost -U billing_user -d billing_db -f sql/schema.sql
        env:
          PGPASSWORD: billing_pass

      - name: Verify tables exist
        run: |
          psql -h localhost -U billing_user -d billing_db -c "
            SELECT table_name FROM information_schema.tables
            WHERE table_schema = 'public'
            ORDER BY table_name;
          "
        env:
          PGPASSWORD: billing_pass

  data-gen-smoke:
    name: Data Generation Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install generator dependency
        run: pip install faker

      - name: Generate small dataset
        run: |
          python src/ingestion/generate_data.py --records 1000
          test -f data/raw/billing_events.csv && echo "events CSV created"
          test -f data/raw/tenants.csv && echo "tenants CSV created"
